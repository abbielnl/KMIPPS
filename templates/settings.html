{% extends "base.html" %}

{% block content %}

<div class="container">

<h2 class="text-center text-primary mb-4">

System Settings

</h2>

{% with messages = get_flashed_messages(with_categories=true) %}

{% if messages %}

{% for category, message in messages %}

<div class="alert alert-success">

{{ message }}

</div>

{% endfor %}

{% endif %}

{% endwith %}

<div class="card shadow">

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Company Name

</label>

<input
type="text"
class="form-control"
name="company_name"
value="{{ settings[0] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Company Email

</label>

<input
type="email"
class="form-control"
name="company_email"
value="{{ settings[1] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Company Phone

</label>

<input
type="text"
class="form-control"
name="company_phone"
value="{{ settings[2] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Company Address

</label>

<textarea
class="form-control"
name="company_address"
rows="3"
required>{{ settings[3] }}</textarea>

</div>

<div class="mb-3">

<label class="form-label">

Currency

</label>

<input
type="text"
class="form-control"
name="default_currency"
value="{{ settings[4] }}"
required>

</div>

<div class="row">

<div class="col-md-6">

<label class="form-label">

Low Risk Limit

</label>

<input
type="number"
class="form-control"
name="low_risk_limit"
value="{{ settings[5] }}"
required>

</div>

<div class="col-md-6">

<label class="form-label">

Medium Risk Limit

</label>

<input
type="number"
class="form-control"
name="medium_risk_limit"
value="{{ settings[6] }}"
required>

</div>

</div>

<br>

<button
class="btn btn-primary btn-lg">

Save Settings

</button>

</form>

</div>

</div>

</div>

{% endblock %}
