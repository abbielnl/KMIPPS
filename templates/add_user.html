{% extends "base.html" %}

{% block content %}

<h2 class="text-primary mb-4">
    Add New User
</h2>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">Username</label>
        <input
            type="text"
            name="username"
            class="form-control"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">Password</label>
        <input
            type="password"
            name="password"
            class="form-control"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">Role</label>

        <select
            name="role"
            class="form-select">

            <option>Administrator</option>
            <option>Underwriter</option>
            <option>Insurance Officer</option>

        </select>

    </div>

    <button class="btn btn-success">
        Create User
    </button>

    <a href="/users" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
